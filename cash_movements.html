<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Castelo · Movimientos de caja</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <div id="sidebarContainer"></div>
    <div id="sidebarBackdrop" class="sidebar-backdrop d-md-none"></div>

    <div class="app-main">
      <main class="container-fluid py-3 py-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-2">
            <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none me-2" type="button" aria-label="Menú principal">
              <i class="bi bi-list"></i>
            </button>
            <h1 class="h4 m-0">Movimientos de caja</h1>
          </div>
        </div>

        <section class="card p-3 p-md-4 mb-3">
          <header class="d-flex align-items-center justify-content-between gap-2 mb-3">
            <h2 class="card-title">Listado</h2>
            <div class="small-muted" id="cashMovementsSummaryText">Ingresos/egresos por caja.</div>
          </header>

          <div class="toolbar-pro mb-3">
            <div class="tool-inline">
              <div class="input-group search-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input id="cashMovSearchInput" type="search" class="form-control" placeholder="Buscar referencia / notas / cliente" />
              </div>

              <button id="btnAddCashMovement" class="btn btn-primary d-flex align-items-center justify-content-center" title="Nuevo movimiento (manual)">
                <i class="bi bi-plus-lg"></i>
              </button>

              <button id="btnRefreshCashMovements" class="btn btn-outline-secondary d-flex align-items-center justify-content-center" title="Recargar">
                <i class="bi bi-arrow-clockwise"></i>
              </button>

              <button class="btn btn-outline-primary d-sm-none ms-auto" type="button"
                      data-bs-toggle="collapse" data-bs-target="#cashMovFiltersCollapse"
                      aria-expanded="false" aria-controls="cashMovFiltersCollapse">
                Filtros
              </button>
            </div>

            <div id="cashMovFiltersCollapse" class="collapse d-sm-block">
              <div class="filters-inline d-flex flex-wrap flex-sm-nowrap align-items-center gap-2">
                <select id="filterCashbox" class="form-select form-select-sm" style="max-width: 260px;">
                  <option value="">Todas las cajas</option>
                </select>

                <select id="filterCashMovType" class="form-select form-select-sm" style="max-width: 140px;">
                  <option value="">Todos</option>
                  <option value="IN">IN</option>
                  <option value="OUT">OUT</option>
                </select>

                <select id="filterCashMovCategory" class="form-select form-select-sm" style="max-width: 200px;">
                  <option value="">Todas las categorías</option>
                  <option value="PAYMENT">PAYMENT</option>
                  <option value="EXPENSE">EXPENSE</option>
                  <option value="TRANSFER">TRANSFER</option>
                  <option value="ADJ">ADJ</option>
                </select>

                <input id="filterCashMovDateFrom" type="date" class="form-control form-control-sm" style="max-width: 160px;" />
                <input id="filterCashMovDateTo" type="date" class="form-control form-control-sm" style="max-width: 160px;" />

                <select id="cashMovPageSize" class="form-select form-select-sm" style="max-width: 100px;">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
          </div>

          <div class="table-responsive pro-table">
            <table class="table table-hover align-middle m-0" id="cashMovementsTable">
              <thead>
                <tr>
                  <th style="min-width: 130px;">Fecha</th>
                  <th style="min-width: 220px;">Caja</th>
                  <th style="min-width: 90px;">Tipo</th>
                  <th style="min-width: 140px;">Categoría</th>
                  <th class="text-end" style="min-width: 140px;">Monto</th>
                  <th style="min-width: 220px;">Referencia</th>
                  <th style="min-width: 220px;">Cliente</th>
                  <th style="min-width: 240px;">Notas</th>
                </tr>
              </thead>
              <tbody id="cashMovementsTableBody"></tbody>
            </table>
          </div>

          <div class="d-flex align-items-center justify-content-between gap-2 mt-2 flex-wrap">
            <div class="small-muted"><span id="cashMovRowsInfo"></span></div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <div class="exports-inline d-flex align-items-center gap-2">
                <button id="btnExportCashMovCsv" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-filetype-csv"></i><span class="btn-label ms-1">CSV</span>
                </button>
                <button id="btnExportCashMovXlsx" class="btn btn-sm btn-outline-success">
                  <i class="bi bi-file-earmark-excel"></i><span class="btn-label ms-1">Excel</span>
                </button>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="cashMovPrevPage"><i class="bi bi-chevron-left"></i></button>
                <span class="mx-1">Página <span id="cashMovPageIndicator">1</span></span>
                <button class="btn btn-outline-secondary btn-sm" id="cashMovNextPage"><i class="bi bi-chevron-right"></i></button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- MODAL MOVIMIENTO MANUAL -->
  <div class="modal fade" id="cashMovementModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title d-flex align-items-center gap-2">
            <i class="bi bi-arrow-left-right"></i>
            <span>Nuevo movimiento</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
          <form id="cashMovementForm" class="needs-validation" novalidate>
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Caja *</label>
                <select id="cmCashbox" class="form-select" required>
                  <option value="">Seleccioná caja</option>
                </select>
                <div class="invalid-feedback">Seleccioná una caja.</div>
              </div>

              <div class="col-6">
                <label class="form-label">Fecha *</label>
                <input id="cmDate" type="date" class="form-control" required>
                <div class="invalid-feedback">Indicá la fecha.</div>
              </div>

              <div class="col-6">
                <label class="form-label">Tipo *</label>
                <select id="cmType" class="form-select" required>
                  <option value="IN">IN</option>
                  <option value="OUT">OUT</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Categoría *</label>
                <select id="cmCategory" class="form-select" required>
                  <option value="EXPENSE">EXPENSE</option>
                  <option value="TRANSFER">TRANSFER</option>
                  <option value="ADJ">ADJ</option>
                  <option value="PAYMENT">PAYMENT</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Monto *</label>
                <input id="cmAmount" type="number" min="0.01" step="0.01" class="form-control" required>
                <div class="invalid-feedback">Indicá un monto válido.</div>
              </div>

              <div class="col-12">
                <label class="form-label">Cliente (opcional)</label>
                <select id="cmCustomer" class="form-select">
                  <option value="">—</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Referencia</label>
                <input id="cmReference" class="form-control" placeholder="Opcional">
              </div>

              <div class="col-12">
                <label class="form-label">Notas</label>
                <input id="cmNotes" class="form-control" placeholder="Opcional">
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btnSaveCashMovement" type="button">
            <i class="bi bi-check2"></i> Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase_client.js"></script>
  <script src="js/sidebar_loader.js"></script>
  <script src="js/cash_movements.js"></script>
</body>
</html>
