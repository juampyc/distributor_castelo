<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Castelo · Stock</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- Barra lateral izquierda -->
    <div id="sidebarContainer"></div>

    <div id="sidebarBackdrop" class="sidebar-backdrop d-md-none"></div>

    <!-- Contenido principal -->
    <div class="app-main">
      <main class="container-fluid py-3 py-md-4">
        <!-- Título + botón menú mobile -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-2">
            <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none me-2" type="button" aria-label="Menú principal">
              <i class="bi bi-list"></i>
            </button>
            <h1 class="h4 m-0">Stock por producto y depósito</h1>
          </div>
        </div>

        <!-- Card listado de stock -->
        <section class="card p-3 p-md-4 mb-3">
          <header class="d-flex align-items-center justify-content-between gap-2 mb-3">
            <h2 class="card-title">Listado</h2>
            <div class="small-muted" id="stockSummaryText">Vista de stock actual por producto y depósito.</div>
          </header>

          <!-- Mini cards de resumen por estilo -->
          <div class="row g-2 mb-3" id="stockSummaryCards">
            <!-- Se rellenan desde stock.js -->
          </div>

          <!-- Toolbar superior -->
          <div class="toolbar-pro mb-3">
            <div class="tool-inline">
              <!-- Buscador -->
              <div class="input-group search-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input
                  id="searchInput"
                  type="search"
                  class="form-control"
                  placeholder="Buscar producto / código / depósito"
                />
              </div>

              <!-- Botón Nuevo -->
              <button
                id="btnNewStock"
                class="btn btn-primary d-flex align-items-center justify-content-center"
                title="Nuevo registro de stock"
              >
                <i class="bi bi-plus-lg"></i>
              </button>

              <!-- Botón Refresh -->
              <button
                id="btnRefreshStock"
                class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
                title="Recargar"
              >
                <i class="bi bi-arrow-clockwise"></i>
              </button>

              <!-- Toggle filtros (solo mobile) -->
              <button
                class="btn btn-outline-primary d-sm-none ms-auto"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#stockFiltersCollapse"
                aria-expanded="false"
                aria-controls="stockFiltersCollapse"
              >
                Filtros
              </button>
            </div>

            <!-- Filtros -->
            <div id="stockFiltersCollapse" class="collapse d-sm-block">
              <div class="filters-inline">
                <select id="filterBrand" class="form-select">
                  <option value="">Todas las marcas</option>
                </select>
                <select id="filterType" class="form-select">
                  <option value="">Todos los tipos</option>
                </select>
                <select id="filterWarehouse" class="form-select">
                  <option value="">Todos los depósitos</option>
                </select>
                <select id="pageSizeStock" class="form-select">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Tabla -->
          <div class="table-responsive pro-table">
            <table class="table table-hover align-middle m-0" id="stockTable">
              <thead>
                <tr>
                  <th style="min-width: 200px;">Producto</th>
                  <th style="min-width: 140px;">Marca</th>
                  <th style="min-width: 140px;">Tipo</th>
                  <th style="min-width: 140px;">Depósito</th>
                  <th class="text-end" style="min-width: 110px;">Stock</th>
                  <th class="text-end" style="min-width: 110px;">Reservado</th>
                  <th class="text-end" style="min-width: 110px;">Disponible</th>
                  <th class="text-end text-nowrap" style="min-width: 120px;">Acciones</th>
                </tr>
              </thead>
              <tbody id="stockTableBody">
                <!-- filas dinámicas -->
              </tbody>
            </table>
          </div>

          <!-- Paginación + Export -->
          <div class="d-flex align-items-center justify-content-between gap-2 mt-2 flex-wrap">
            <div class="small-muted"><span id="paginationInfo"></span></div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <div class="exports-inline d-flex align-items-center gap-2">
                <button id="btnExportCsv" class="btn btn-sm btn-outline-primary" aria-label="Exportar CSV">
                  <i class="bi bi-filetype-csv"></i><span class="btn-label ms-1">CSV</span>
                </button>
                <button id="btnExportXlsx" class="btn btn-sm btn-outline-success" aria-label="Exportar Excel">
                  <i class="bi bi-file-earmark-excel"></i><span class="btn-label ms-1">Excel</span>
                </button>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="paginationPrev">
                  <i class="bi bi-chevron-left"></i>
                </button>
                <span class="mx-1">Página <span id="stockPageIndicator">1</span></span>
                <button class="btn btn-outline-secondary btn-sm" id="paginationNext">
                  <i class="bi bi-chevron-right"></i>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- MODAL: CREAR / EDITAR STOCK -->
  <div class="modal fade" id="stockModal" tabindex="-1" data-bs-focus="false" aria-labelledby="stockModalLabel">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title d-flex align-items-center gap-2">
            <i class="bi bi-archive me-1"></i><span id="stockModalLabel">Nuevo stock</span>
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Cerrar"
          ></button>
        </div>

        <div class="modal-body">
          <form id="stockForm" class="needs-validation" novalidate>
            <input type="hidden" id="stockId" />

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label for="stockProduct" class="form-label">Producto *</label>
                <select
                  id="stockProduct"
                  class="form-select"
                  required
                >
                  <option value="">Seleccionar producto...</option>
                </select>
                <div class="invalid-feedback">Seleccioná un producto.</div>
              </div>

              <div class="col-12 col-md-6">
                <label for="stockWarehouse" class="form-label">Depósito *</label>
                <div class="input-group">
                  <select
                    id="stockWarehouse"
                    class="form-select"
                    required
                  >
                    <option value="">Seleccionar depósito...</option>
                  </select>
                  <button
                    type="button"
                    id="btnAddWarehouse"
                    class="btn btn-outline-primary"
                    title="Nuevo depósito"
                  >
                    <i class="bi bi-plus-lg"></i>
                  </button>
                  <div class="invalid-feedback">Seleccioná un depósito.</div>
                </div>
              </div>

              <div class="col-12 col-md-4">
                <label for="stockQuantity" class="form-label">Stock *</label>
                <input
                  type="number"
                  step="0.001"
                  min="0"
                  class="form-control"
                  id="stockQuantity"
                  required
                />
                <div class="invalid-feedback">Ingresá una cantidad válida.</div>
              </div>

              <div class="col-12 col-md-4">
                <label for="stockLot" class="form-label">Lote</label>
                <input
                  type="text"
                  class="form-control"
                  id="stockLot"
                  placeholder="Ej: L2025-01"
                />
              </div>

              <div class="col-12 col-md-4">
                <label for="stockExpiration" class="form-label">Vencimiento</label>
                <input
                  type="date"
                  class="form-control"
                  id="stockExpiration"
                />
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-outline-secondary"
            data-bs-dismiss="modal"
          >
            Cancelar
          </button>
          <button type="submit" form="stockForm" class="btn btn-primary">
            <i class="bi bi-check2"></i> Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase_client.js"></script>
  <script src="js/sidebar_loader.js"></script>
  <script src="js/stock.js"></script>
</body>
</html>
