<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Castelo · Movimientos de stock</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- Barra lateral izquierda -->
    <div id="sidebarContainer"></div>

    <div id="sidebarBackdrop" class="sidebar-backdrop d-md-none"></div>

    <!-- Contenido principal -->
    <div class="app-main">
      <main class="container-fluid py-3 py-md-4">
        <!-- Título + botón menú mobile -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-2">
            <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none me-2" type="button" aria-label="Menú principal">
              <i class="bi bi-list"></i>
            </button>
            <h1 class="h4 m-0">Movimientos de stock</h1>
          </div>
        </div>

        <!-- Card listado de movimientos -->
        <section class="card p-3 p-md-4 mb-3">
          <header class="d-flex align-items-center justify-content-between gap-2 mb-3">
            <h2 class="card-title">Listado</h2>
            <div class="small-muted" id="movementsSummaryText">Historial de movimientos de stock.</div>
          </header>

          <!-- Toolbar superior -->
          <div class="toolbar-pro mb-3">
            <div class="tool-inline">
              <!-- Buscador -->
              <div class="input-group search-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input
                  id="movementsSearchInput"
                  type="search"
                  class="form-control"
                  placeholder="Buscar producto / código / lote / referencia"
                />
              </div>

              <!-- Botón Refresh -->
              <button
                id="btnRefreshMovements"
                class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
                title="Recargar"
              >
                <i class="bi bi-arrow-clockwise"></i>
              </button>

              <!-- Toggle filtros (solo mobile) -->
              <button
                class="btn btn-outline-primary d-sm-none ms-auto"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#movementsFiltersCollapse"
                aria-expanded="false"
                aria-controls="movementsFiltersCollapse"
              >
                Filtros
              </button>
            </div>

            <!-- Filtros -->
            <div id="movementsFiltersCollapse" class="collapse d-sm-block">
              <div class="filters-inline d-flex flex-wrap flex-sm-nowrap align-items-center gap-2">
                <select
                  id="filterMovementType"
                  class="form-select form-select-sm"
                  style="max-width: 150px;"
                >
                  <option value="">Todos los tipos</option>
                  <option value="IN">Ingreso</option>
                  <option value="OUT">Egreso</option>
                  <option value="OUT_KIT">Egreso por kit</option>
                  <option value="ADJUST">Ajuste</option>
                </select>

                <input
                  id="filterProduct"
                  type="text"
                  class="form-control form-control-sm"
                  placeholder="Filtro producto (cód/desc)"
                  style="max-width: 220px;"
                />

                <input
                  id="filterDateFrom"
                  type="date"
                  class="form-control form-control-sm"
                  style="max-width: 150px;"
                />
                <input
                  id="filterDateTo"
                  type="date"
                  class="form-control form-control-sm"
                  style="max-width: 150px;"
                />

                <select
                  id="movementsPageSize"
                  class="form-select form-select-sm"
                  style="max-width: 100px;"
                >
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Tabla -->
          <div class="table-responsive pro-table">
            <table class="table table-hover align-middle m-0" id="movementsTable">
              <thead>
                <tr>
                  <th style="min-width: 160px;">Fecha</th>
                  <th style="min-width: 220px;">Producto</th>
                  <th style="min-width: 140px;">Marca</th>
                  <th style="min-width: 80px; width: 80px;">Tipo</th>
                  <th class="text-end" style="min-width: 110px;">Cantidad</th>
                  <th style="min-width: 120px;">Lote</th>
                  <th style="min-width: 140px;">Depósito</th>
                  <th style="min-width: 160px;">Referencia</th>
                </tr>
              </thead>
              <tbody id="movementsTableBody">
                <!-- filas dinámicas -->
              </tbody>
            </table>
          </div>

          <!-- Paginación + Export -->
          <div class="d-flex align-items-center justify-content-between gap-2 mt-2 flex-wrap">
            <div class="small-muted"><span id="movementsPaginationInfo"></span></div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <div class="exports-inline d-flex align-items-center gap-2">
                <button id="btnExportMovementsCsv" class="btn btn-sm btn-outline-primary" aria-label="Exportar CSV">
                  <i class="bi bi-filetype-csv"></i><span class="btn-label ms-1">CSV</span>
                </button>
                <button id="btnExportMovementsXlsx" class="btn btn-sm btn-outline-success" aria-label="Exportar Excel">
                  <i class="bi bi-file-earmark-excel"></i><span class="btn-label ms-1">Excel</span>
                </button>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="movementsPrevPage">
                  <i class="bi bi-chevron-left"></i>
                </button>
                <span class="mx-1">Página <span id="movementsPageIndicator">1</span></span>
                <button class="btn btn-outline-secondary btn-sm" id="movementsNextPage">
                  <i class="bi bi-chevron-right"></i>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase_client.js"></script>
  <script src="js/sidebar_loader.js"></script>
  <script src="js/movements.js"></script>
</body>
</html>
