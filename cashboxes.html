<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Castelo · Cajas</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <div id="sidebarContainer"></div>
    <div id="sidebarBackdrop" class="sidebar-backdrop d-md-none"></div>

    <div class="app-main">
      <main class="container-fluid py-3 py-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="d-flex align-items-center gap-2">
            <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none me-2" type="button" aria-label="Menú principal">
              <i class="bi bi-list"></i>
            </button>
            <h1 class="h4 m-0">Cajas</h1>
          </div>
        </div>

        <section class="card p-3 p-md-4 mb-3">
          <header class="d-flex align-items-center justify-content-between gap-2 mb-3">
            <h2 class="card-title">Listado</h2>
            <div class="small-muted" id="cashboxesSummaryText">Gestión de cajas y saldos.</div>
          </header>

          <div class="toolbar-pro mb-3">
            <div class="tool-inline">
              <div class="input-group search-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input id="cashboxesSearchInput" type="search" class="form-control" placeholder="Buscar nombre / código" />
              </div>

              <button id="btnAddCashbox" class="btn btn-primary d-flex align-items-center justify-content-center" title="Nueva caja">
                <i class="bi bi-plus-lg"></i>
              </button>

              <button id="btnRefreshCashboxes" class="btn btn-outline-secondary d-flex align-items-center justify-content-center" title="Recargar">
                <i class="bi bi-arrow-clockwise"></i>
              </button>

              <button class="btn btn-outline-primary d-sm-none ms-auto" type="button"
                      data-bs-toggle="collapse" data-bs-target="#cashboxesFiltersCollapse"
                      aria-expanded="false" aria-controls="cashboxesFiltersCollapse">
                Filtros
              </button>
            </div>

            <div id="cashboxesFiltersCollapse" class="collapse d-sm-block">
              <div class="filters-inline d-flex flex-wrap flex-sm-nowrap align-items-center gap-2">
                <select id="filterCashboxActive" class="form-select form-select-sm" style="max-width: 190px;">
                  <option value="all">Todos (activo/inactivo)</option>
                  <option value="active">Activas</option>
                  <option value="inactive">Inactivas</option>
                </select>

                <select id="cashboxesPageSize" class="form-select form-select-sm" style="max-width: 100px;">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
          </div>

          <div class="table-responsive pro-table">
            <table class="table table-hover align-middle m-0" id="cashboxesTable">
              <thead>
                <tr>
                  <th style="min-width: 220px;">Nombre</th>
                  <th style="min-width: 160px;">Código</th>
                  <th style="min-width: 120px;">Estado</th>
                  <th class="text-end" style="min-width: 160px;">Saldo</th>
                  <th class="text-end" style="min-width: 160px;">Acciones</th>
                </tr>
              </thead>
              <tbody id="cashboxesTableBody"></tbody>
            </table>
          </div>

          <div class="d-flex align-items-center justify-content-between gap-2 mt-2 flex-wrap">
            <div class="small-muted"><span id="cashboxesRowsInfo"></span></div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <div class="exports-inline d-flex align-items-center gap-2">
                <button id="btnExportCashboxesCsv" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-filetype-csv"></i><span class="btn-label ms-1">CSV</span>
                </button>
                <button id="btnExportCashboxesXlsx" class="btn btn-sm btn-outline-success">
                  <i class="bi bi-file-earmark-excel"></i><span class="btn-label ms-1">Excel</span>
                </button>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="cashboxesPrevPage"><i class="bi bi-chevron-left"></i></button>
                <span class="mx-1">Página <span id="cashboxesPageIndicator">1</span></span>
                <button class="btn btn-outline-secondary btn-sm" id="cashboxesNextPage"><i class="bi bi-chevron-right"></i></button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- MODAL CAJA -->
  <div class="modal fade" id="cashboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title d-flex align-items-center gap-2">
            <i class="bi bi-safe2"></i>
            <span id="cashboxModalTitle">Nueva caja</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
          <form id="cashboxForm" class="needs-validation" novalidate>
            <input type="hidden" id="cashboxId">

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label">Código *</label>
                <input id="cashboxCode" class="form-control" required placeholder="Ej: CAJA-01">
                <div class="invalid-feedback">Ingresá el código.</div>
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label">Nombre *</label>
                <input id="cashboxName" class="form-control" required placeholder="Caja principal">
                <div class="invalid-feedback">Ingresá el nombre.</div>
              </div>

              <div class="col-12">
                <label class="form-label">Descripción</label>
                <input id="cashboxDescription" class="form-control" placeholder="Opcional">
              </div>

              <div class="col-12 col-md-4 d-flex align-items-end">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="cashboxIsActive" checked>
                  <label class="form-check-label" for="cashboxIsActive">Activa</label>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btnSaveCashbox" type="button">
            <i class="bi bi-check2"></i> Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="js/app.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase_client.js"></script>
  <script src="js/sidebar_loader.js"></script>
  <script src="js/cashboxes.js"></script>
</body>
</html>
